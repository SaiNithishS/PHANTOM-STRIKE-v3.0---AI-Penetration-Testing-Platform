<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHANTOM STRIKE - AI Penetration Testing Platform</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Core CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* Global CSS Variable System */
    :root {
      --bg-dark: #080B12;
      --surface-dark: #0C1018;
      --card-bg: #111827;
      --border-color: #1E2D42;
      --primary-accent: #00D4FF;
      --primary-glow: rgba(0, 212, 255, 0.15);
      --text-primary: #E8EDF5;
      --text-secondary: #8B9AB5;
      
      /* Severity Palette */
      --color-critical: #FF3B3B;
      --color-high: #FF6B35;
      --color-medium: #FFB800;
      --color-low: #00C851;
      --color-info: #0088FF;

      --font-headings: 'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-code: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-accent);
    }

    /* Screen 1: Config Screen Styles */
    .config-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      background: radial-gradient(circle at center, #101B2E 0%, #080B12 100%);
    }

    .config-card {
      width: 100%;
      max-width: 580px;
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 30px var(--primary-glow);
      backdrop-filter: blur(12px);
    }

    .config-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .config-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: var(--primary-glow);
      border: 2px solid var(--primary-accent);
      border-radius: 50%;
      margin-bottom: 16px;
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .config-logo svg {
      width: 32px;
      height: 32px;
      fill: var(--primary-accent);
    }

    .config-title {
      font-family: var(--font-headings);
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-primary);
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    .config-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-family: var(--font-headings);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--primary-accent);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .form-input {
      width: 100%;
      background: #090D16;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary-accent);
      box-shadow: 0 0 10px var(--primary-glow);
    }

    .form-input.password-input {
      padding-right: 48px;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-headings);
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 0.5px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: var(--primary-accent);
    }

    .form-note {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 30px;
    }

    .btn {
      font-family: var(--font-headings);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 14px 20px;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .btn-primary {
      background: var(--primary-accent);
      color: var(--bg-dark);
      border: 1px solid var(--primary-accent);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
    }

    .btn-primary:hover {
      background: #00b8e6;
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--text-secondary);
    }

    .config-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .alert-card {
      background: rgba(255, 59, 59, 0.1);
      border: 1px solid var(--color-critical);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: var(--text-primary);
      font-size: 13px;
    }

    .alert-card-title {
      font-weight: bold;
      color: var(--color-critical);
      margin-bottom: 4px;
    }

    .alert-card-details {
      font-family: var(--font-code);
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 6px;
      background: #000;
      padding: 6px;
      border-radius: 4px;
      overflow-x: auto;
    }

    /* Screen 2: Main Layout */
    .app-layout {
      display: grid;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* Header Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface-dark);
      border-bottom: 1px solid var(--border-color);
      padding: 0 24px;
      z-index: 10;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-bar-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: var(--primary-glow);
      border: 1px solid var(--primary-accent);
      border-radius: 50%;
    }

    .top-bar-logo svg {
      width: 14px;
      height: 14px;
      fill: var(--primary-accent);
    }

    .top-bar-title {
      font-family: var(--font-headings);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-primary);
    }

    .top-bar-center {
      font-family: var(--font-headings);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--primary-accent);
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-family: var(--font-headings);
      letter-spacing: 0.5px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.connected {
      background-color: var(--color-low);
      box-shadow: 0 0 8px var(--color-low);
      animation: pulse 2s infinite;
    }

    .status-dot.demo {
      background-color: var(--color-medium);
      box-shadow: 0 0 8px var(--color-medium);
      animation: pulse 2s infinite;
    }

    .divider {
      width: 1px;
      height: 20px;
      background: var(--border-color);
    }

    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .settings-btn:hover {
      color: var(--primary-accent);
    }

    .settings-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Sidebar Navigation */
    .main-body {
      display: grid;
      grid-template-columns: 200px 1fr;
      height: 100%;
      overflow: hidden;
    }

    .sidebar {
      background: var(--surface-dark);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      justify-content: space-between;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      padding: 14px 24px;
      font-family: var(--font-headings);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-secondary);
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .nav-item:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.02);
    }

    .nav-item.active {
      color: var(--primary-accent);
      background: rgba(0, 212, 255, 0.04);
    }

    .nav-item.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--primary-accent);
      box-shadow: 0 0 10px var(--primary-accent);
    }

    .sidebar-footer {
      padding: 0 24px;
      font-size: 10px;
      color: var(--text-secondary);
      line-height: 1.4;
      font-family: var(--font-code);
    }

    /* Content Area */
    .content-area {
      overflow-y: auto;
      padding: 30px;
      background: var(--bg-dark);
    }

    .demo-banner {
      background: linear-gradient(90deg, rgba(255, 184, 0, 0.15) 0%, rgba(255, 107, 53, 0.15) 100%);
      border: 1px solid var(--color-medium);
      border-radius: 6px;
      padding: 10px 20px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .demo-banner-title {
      font-weight: bold;
      color: var(--color-medium);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Overview Tab Layout */
    .overview-grid {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 30px;
    }

    @media (max-width: 992px) {
      .overview-grid {
        grid-template-columns: 1fr;
      }
    }

    .dashboard-panel {
      background: var(--surface-dark);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 30px;
    }

    .panel-title {
      font-family: var(--font-headings);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 18px;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Upload Zone */
    .upload-zone {
      border: 2px dashed var(--border-color);
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(12, 16, 24, 0.5);
    }

    .upload-zone:hover, .upload-zone.drag-active {
      border-color: var(--primary-accent);
      background: rgba(0, 212, 255, 0.02);
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .upload-icon {
      margin-bottom: 16px;
    }

    .upload-icon svg {
      width: 48px;
      height: 48px;
      fill: var(--text-secondary);
      transition: fill 0.2s;
    }

    .upload-zone:hover .upload-icon svg {
      fill: var(--primary-accent);
    }

    .upload-text {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .upload-subtext {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .file-loaded-info {
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 6px;
      padding: 12px 16px;
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .file-details {
      font-family: var(--font-code);
      font-size: 12px;
    }

    .file-remove-btn {
      background: none;
      border: none;
      color: var(--color-critical);
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    .launch-btn-wrapper {
      margin-top: 20px;
    }

    /* Terminal Window */
    .terminal-window {
      background: #030508;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-family: var(--font-code);
      font-size: 12px;
      padding: 16px;
      margin-top: 24px;
    }

    .terminal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 8px;
      margin-bottom: 12px;
      color: var(--text-secondary);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .terminal-body {
      height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      color: #00FF66;
    }

    .terminal-line {
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .terminal-line .timestamp {
      color: var(--text-secondary);
      margin-right: 8px;
    }

    .terminal-line.error {
      color: var(--color-critical);
    }

    .terminal-line.success {
      color: var(--primary-accent);
    }

    /* Overview Right Column: Metrics Cards */
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .metric-card.critical { border-left: 4px solid var(--color-critical); }
    .metric-card.high { border-left: 4px solid var(--color-high); }
    .metric-card.medium { border-left: 4px solid var(--color-medium); }
    .metric-card.low { border-left: 4px solid var(--color-low); }

    .metric-label {
      font-family: var(--font-headings);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .metric-value {
      font-family: var(--font-code);
      font-size: 28px;
      font-weight: bold;
      margin-top: 8px;
      color: var(--text-primary);
    }

    /* SVG Risk Score Gauge */
    .risk-gauge-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    .gauge-wrapper {
      position: relative;
      width: 150px;
      height: 150px;
    }

    .gauge-svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .gauge-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 12;
    }

    .gauge-fill {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      transition: stroke-dasharray 1s ease-out;
    }

    .gauge-value-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .gauge-number {
      font-family: var(--font-code);
      font-size: 36px;
      font-weight: 700;
    }

    .gauge-label {
      font-family: var(--font-headings);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: -4px;
    }

    .worst-finding-banner {
      background: rgba(255, 59, 59, 0.05);
      border: 1px solid rgba(255, 59, 59, 0.2);
      border-left: 4px solid var(--color-critical);
      border-radius: 4px;
      padding: 12px 16px;
      margin-top: 20px;
      font-size: 13px;
    }

    .worst-finding-banner-title {
      font-weight: bold;
      color: var(--color-critical);
      margin-bottom: 4px;
    }

    /* Compliance Fills */
    .compliance-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 10px;
    }

    .compliance-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .compliance-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: bold;
    }

    .compliance-bar-track {
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    .compliance-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--primary-accent);
      transition: width 1s ease-out;
    }

    /* Vulnerabilities Tab */
    .vulnerabilities-filter {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      font-family: var(--font-headings);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--text-primary);
      color: var(--text-primary);
    }

    .filter-btn.active {
      background: var(--primary-glow);
      border-color: var(--primary-accent);
      color: var(--primary-accent);
    }

    .vuln-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .vuln-card {
      background: var(--surface-dark);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .vuln-card:hover {
      border-color: rgba(0, 212, 255, 0.3);
    }

    .vuln-header {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      background: #0e1420;
    }

    .vuln-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .vuln-id {
      font-family: var(--font-code);
      font-size: 13px;
      font-weight: bold;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.03);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
    }

    .vuln-title {
      font-family: var(--font-headings);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-primary);
    }

    .vuln-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .severity-badge {
      font-family: var(--font-headings);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      text-align: center;
      min-width: 80px;
    }

    .severity-badge.critical { background: rgba(255, 59, 59, 0.15); color: var(--color-critical); border: 1px solid var(--color-critical); }
    .severity-badge.high { background: rgba(255, 107, 53, 0.15); color: var(--color-high); border: 1px solid var(--color-high); }
    .severity-badge.medium { background: rgba(255, 184, 0, 0.15); color: var(--color-medium); border: 1px solid var(--color-medium); }
    .severity-badge.low { background: rgba(0, 200, 81, 0.15); color: var(--color-low); border: 1px solid var(--color-low); }
    .severity-badge.info { background: rgba(0, 136, 255, 0.15); color: var(--color-info); border: 1px solid var(--color-info); }

    .vuln-body {
      padding: 24px;
      border-top: 1px solid var(--border-color);
      background: rgba(12, 16, 24, 0.8);
    }

          try {

            const filesList = [];
            
            // Loop through entries

        const secretsFound = [];
        files.forEach(f => {
          secretPatterns.forEach(pat => {
            let match;
            pat.regex.lastIndex = 0; // reset
            const lines = f.content.split('\n');
            lines.forEach((line, idx) => {
              const matches = line.match(pat.regex);
              if (matches) {
                matches.forEach(m => {
                  secretsFound.push({
                    type: pat.type,
                    file: f.name,
                    line: String(idx + 1),
                    preview: m.substring(0, 4) + "****",

        // 2. Dependencies Scan
        const depsFound = [];
        const packageJsonFile = files.find(f => f.name.endsWith("package.json"));
        const requirementsFile = files.find(f => f.name.endsWith("requirements.txt"));
        const pomFile = files.find(f => f.name.endsWith("pom.xml"));
        const goModFile = files.find(f => f.name.endsWith("go.mod"));

        if (packageJsonFile) {
          try {
            const pkg = JSON.parse(packageJsonFile.content);
            const combined = { ...(pkg.dependencies || {}), ...(pkg.devDependencies || {}) };
            Object.keys(combined).forEach(key => {
              depsFound.push({ package: key, current_version: combined[key], source: "package.json" });
            });
          } catch(e) {}
        }
        if (requirementsFile) {
          requirementsFile.content.split('\n').forEach(line => {
            const cleanLine = line.trim();
            if (cleanLine && !cleanLine.startsWith('#')) {
              const parts = cleanLine.split(/==|>=|<=/);
              depsFound.push({

              if (parts.length >= 2) {

              }

            const singleReq = /require\s+(\S+)\s+(\S+)/g;

          config: /config|settings|env|\.env|properties|yml|yaml|json/i,
          api: /api|route|controller|endpoint|handler/i,
          db: /db|database|schema|model|sql|query|migrate|prisma/i

          else if (priorityMatches.config.test(f.name)) score = 2;

          else if (priorityMatches.db.test(f.name)) score = 4;

                            <div style={{ marginTop: "16px", display: "flex", flexDirection: "column", gap: "8px" }}>
                              {results.target && <div style={{ display: "flex", justifyContent: "space-between", fontSize: "12px", color: "var(--text-secondary)", borderBottom: "1px solid var(--border-color)", paddingBottom: "6px" }}><span>TARGET</span><span style={{ color: "var(--text-primary)" }}>{results.target}</span></div>}
                              {results.timestamp && <div style={{ display: "flex", justifyContent: "space-between", fontSize: "12px", color: "var(--text-secondary)", borderBottom: "1px solid var(--border-color)", paddingBottom: "6px" }}><span>TIMESTAMP</span><span style={{ color: "var(--text-primary)" }}>{new Date(results.timestamp).toLocaleString()}</span></div>}
                              {results.executive_summary?.overall_risk && <div style={{ display: "flex", justifyContent: "space-between", fontSize: "12px", color: "var(--text-secondary)", borderBottom: "1px solid var(--border-color)", paddingBottom: "6px" }}><span>RISK LEVEL</span><span className={`severity-badge ${results.executive_summary.overall_risk.toLowerCase()}`}>{results.executive_summary.overall_risk}</span></div>}
                              {results.executive_summary?.total_findings !== undefined && <div style={{ display: "flex", justifyContent: "space-between", fontSize: "12px", color: "var(--text-secondary)", paddingBottom: "6px" }}><span>TOTAL FINDINGS</span><span style={{ color: "var(--primary-accent)", fontWeight: "bold" }}>{results.executive_summary.total_findings}</span></div>}
                            </div>
                          )}
                        </div>

                        {/* Terminal Logger Console */}
                        {(terminalLogs.length > 0 || analysisStatus === "ANALYZING") && (
                          <div className="terminal-window">
                            <div className="terminal-header">
                              <span>System logs console</span>
                              <span style={{ color: "var(--primary-accent)", animation: "pulse 1.5s infinite" }}>● ONLINE</span>
                            </div>
                            <div className="terminal-body">
                              {terminalLogs.map((log, i) => (
                                <div key={i} className={`terminal-line ${log.type}`}>
                                  <span className="timestamp">[{log.time}]</span>
                                  <span>{log.text}</span>
                                </div>
                              ))}
                              <div ref={terminalEndRef}></div>
                            </div>
                          </div>
                        )}
                      </div>

                      {/* RIGHT RISK METRICS */}
                      <div>
                        {/* 2x2 Severity Grid */}
                        <div className="metrics-grid">
                          <div className="metric-card critical">
                            <div className="metric-label">Critical Gaps</div>
                            <div className="metric-value">
                              {results ? results.vulnerabilities.filter(v => v.severity === "CRITICAL").length : "—"}
                            </div>
                          </div>
                          <div className="metric-card high">
                            <div className="metric-label">High Severity</div>
                            <div className="metric-value">
                              {results ? results.vulnerabilities.filter(v => v.severity === "HIGH").length : "—"}
                            </div>
                          </div>
                          <div className="metric-card medium">
                            <div className="metric-label">Medium Risk</div>
                            <div className="metric-value">
                              {results ? results.vulnerabilities.filter(v => v.severity === "MEDIUM").length : "—"}
                            </div>
                          </div>
                          <div className="metric-card low">
                            <div className="metric-label">Low / Info</div>
                            <div className="metric-value">
                              {results ? results.vulnerabilities.filter(v => v.severity === "LOW").length : "—"}
                            </div>
                          </div>
                        </div>

                        {/* Risk Gauge Circle */}
                        <div className="dashboard-panel">
                          <div className="panel-title">AGGREGATED RISK THREAT SCORE</div>
                          <div className="risk-gauge-container">
                            <div className="gauge-wrapper">
                              <svg className="gauge-svg" viewBox="0 0 120 120">
                                <circle className="gauge-track" cx="60" cy="60" r="50" />
                                <circle 
                                  className="gauge-fill" 
                                  cx="60" 
                                  cy="60" 
                                  r="50"
                                  style={{
                                    stroke: results ? (results.executive_summary.risk_score >= 70 ? 'var(--color-critical)' : results.executive_summary.risk_score >= 40 ? 'var(--color-medium)' : 'var(--color-low)') : 'var(--border-color)',
                                    strokeDasharray: results ? `${(results.executive_summary.risk_score / 100) * 314} 314` : "0 314"
                                  }}
                                />
                              </svg>
                              <div className="gauge-value-text">
                                <div className="gauge-number">{results ? results.executive_summary.risk_score : 0}</div>
                                <div className="gauge-label">INDEX</div>
                              </div>
                            </div>
                          </div>

                          {results && (
                            <div className="worst-finding-banner">
                              <div className="worst-finding-banner-title">✗ STRONGEST VECTOR THREAT PATH</div>
                              <div>{results.executive_summary.worst_finding}</div>
                            </div>
                          )}
                        </div>

                        {/* Compliance Progress Bars */}
                        <div className="dashboard-panel">
                          <div className="panel-title">COMPLIANCE STANDARDS COMPATIBILITY</div>
                          <div className="compliance-list">
                            <div className="compliance-item">
                              <div className="compliance-meta">
                                <span>OWASP ASVS Standard</span>
                                <span>{results ? results.compliance.owasp_asvs_score : 0}%</span>
                              </div>
                              <div className="compliance-bar-track">
                                <div 
                                  className="compliance-bar-fill"
                                  style={{ width: results ? `${results.compliance.owasp_asvs_score}%` : '0%' }}
                                ></div>
                              </div>
                            </div>
                            <div className="compliance-item">
                              <div className="compliance-meta">
                                <span>ISO 27001 Requirements</span>
                                <span>{results ? results.compliance.iso27001_score : 0}%</span>
                              </div>
                              <div className="compliance-bar-track">
                                <div 
                                  className="compliance-bar-fill"
                                  style={{ width: results ? `${results.compliance.iso27001_score}%` : '0%' }}
                                ></div>
                              </div>
                            </div>
                            <div className="compliance-item">
                              <div className="compliance-meta">
                                <span>SOC 2 Common Criteria</span>
                                <span>{results ? results.compliance.soc2_score : 0}%</span>
                              </div>
                              <div className="compliance-bar-track">
                                <div 
                                  className="compliance-bar-fill"
                                  style={{ width: results ? `${results.compliance.soc2_score}%` : '0%' }}
                                ></div>
                              </div>
                            </div>
                          </div>
                        </div>

                      </div>
                    </div>
                  )}

                  {/* VULNERABILITIES TAB */}
                  {activeTab === "VULNERABILITIES" && (
                    <div>
                      {results ? (
                        <div>
                          {/* Filters */}
                          <div className="vulnerabilities-filter">
                            {["ALL", "CRITICAL", "HIGH", "MEDIUM", "LOW"].map(sev => (
                              <button 
                                key={sev} 
                                className={`filter-btn ${vulnFilter === sev ? 'active' : ''}`}
                                onClick={() => setVulnFilter(sev)}
                              >
                                {sev} ({sev === "ALL" ? results.vulnerabilities.length : results.vulnerabilities.filter(v => v.severity === sev).length})
                              </button>
                            ))}
                          </div>

                          {/* List */}
                          <div className="vuln-list">
                            {results.vulnerabilities
                              .filter(v => vulnFilter === "ALL" || v.severity === vulnFilter)
                              .map((v, i) => {
                                const isPocRevealed = revealedPocs[v.id];
                                return (
                                  <div className="vuln-card" key={v.id}>
                                    {/* Header Row */}
                                    <div className="vuln-header" onClick={() => togglePoc(`expand_${v.id}`)}>
                                      <div className="vuln-header-left">
                                        <span className="vuln-id">{v.id}</span>
                                        <span className="vuln-title">{v.title}</span>
                                      </div>
                                      <div className="vuln-header-right">
                                        <span className={`severity-badge ${v.severity.toLowerCase()}`}>{v.severity}</span>
                                        <span style={{ fontSize: "12px", fontFamily: "var(--font-code)", color: "var(--text-secondary)" }}>
                                          CVSS {v.cvss_score}
                                        </span>
                                      </div>
                                    </div>

                                    {/* Collapsible content body */}
                                    {revealedPocs[`expand_${v.id}`] && (
                                      <div className="vuln-body">
                                        <div className="vuln-detail-grid">
                                          <div>
                                            <div className="form-group">
                                              <div className="vuln-info-label">AFFECTED COMPONENT</div>
                                              <div className="vuln-info-value" style={{ fontFamily: "var(--font-code)" }}>
                                                {v.affected_file} : Line {v.affected_line}
                                              </div>
                                            </div>
                                            <div className="form-group">
                                              <div className="vuln-info-label">VULNERABILITY CLASS</div>
                                              <div className="vuln-info-value">{v.cwe_id} — {v.cwe_name}</div>
                                            </div>
                                            <div className="form-group">
                                              <div className="vuln-info-label">CLASSIFICATION STANDARDS</div>
                                              <div className="vuln-info-value">
                                                OWASP: {v.owasp_category}<br />
                                                MITRE: {v.mitre_technique}
                                              </div>
                                            </div>
                                            <div className="form-group">
                                              <div className="vuln-info-label">CVSS METRICS VECTOR</div>
                                              <div className="vuln-info-value" style={{ fontFamily: "var(--font-code)", fontSize: "11px", color: "var(--text-secondary)" }}>
                                                {v.cvss_vector}
                                              </div>
                                            </div>
                                          </div>
                                          <div>
                                            <div className="form-group">
                                              <div className="vuln-info-label">DESCRIPTION</div>
                                              <div className="vuln-info-value">{v.description}</div>
                                            </div>
                                            <div className="form-group">
                                              <div className="vuln-info-label">POTENTIAL BUSINESS IMPACT</div>
                                              <div className="vuln-info-value">{v.impact}</div>
                                            </div>
                                          </div>
                                        </div>

                                        {v.vulnerable_code && (
                                          <div className="code-container">
                                            <div className="vuln-info-label">VULNERABLE CODE SEGMENT</div>
                                            <pre className="code-block">
                                              <span className="code-line-red">{v.vulnerable_code}</span>
                                            </pre>
                                          </div>
                                        )}

                                        {v.poc_payload && (
                                          <div className="poc-box">
                                            <div className="poc-title">⚠ PROOF OF CONCEPT PAYLOAD (AUTHORISED PEN TESTING ONLY)</div>
                                            {!isPocRevealed && (
                                              <div className="poc-reveal-tip" onClick={(e) => { e.stopPropagation(); togglePoc(v.id); }}>
                                                Reveal Payload
                                              </div>
                                            )}
                                            <div className={`poc-payload-blur ${isPocRevealed ? 'revealed' : ''}`}>
                                              <pre style={{ fontFamily: "var(--font-code)", fontSize: "12px", margin: 0, whiteSpace: "pre-wrap" }}>
                                                {v.poc_payload}
                                              </pre>
                                            </div>
                                          </div>
                                        )}
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                          </div>
                        </div>
                      ) : (
                        <div style={{ textAlign: "center", padding: "40px", color: "var(--text-secondary)" }}>
                          No analysis findings loaded. Return to Overview and run analysis.
                        </div>
                      )}
                    </div>
                  )}

                  {/* SECRETS & DEPS TAB */}
                  {activeTab === "SECRETS_DEPS" && (
                    <div className="secrets-deps-grid">
                      {/* Left: Secrets */}
                      <div className="dashboard-panel">
                        <div className="panel-title">HARDCODED SECRETS EXPOSURE</div>
                        {results && results.secrets_confirmed && results.secrets_confirmed.length > 0 ? (
                          <div className="table-container">
                            <table className="data-table">
                              <thead>
                                <tr>
                                  <th>Type</th>
                                  <th>File</th>
                                  <th>Line</th>
                                  <th>Preview</th>
                                  <th>Severity</th>
                                </tr>
                              </thead>
                              <tbody>
                                {results.secrets_confirmed.map((s, idx) => (
                                  <tr key={idx}>
                                    <td className="secret-row-type">{s.type}</td>
                                    <td className="secret-row-file">{s.file}</td>
                                    <td style={{ fontFamily: "var(--font-code)" }}>{s.line}</td>
                                    <td className="secret-row-preview">{s.preview}</td>
                                    <td>
                                      <span className={`severity-badge ${s.severity.toLowerCase()}`} style={{ minWidth: "60px", fontSize: "10px" }}>
                                        {s.severity}
                                      </span>
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        ) : (
                          <div style={{ textAlign: "center", padding: "40px", color: "var(--text-secondary)", fontSize: "13px" }}>
                            ✓ No hardcoded secrets or credentials matching pattern scans.
                          </div>
                        )}
                      </div>

                      {/* Right: Dependencies */}
                      <div className="dashboard-panel">
                        <div className="panel-title">VULNERABLE EXTERNAL DEPENDENCIES</div>
                        {results && results.vulnerable_dependencies && results.vulnerable_dependencies.length > 0 ? (
                          <div className="table-container">
                            <table className="data-table">
                              <thead>
                                <tr>
                                  <th>Library Package</th>
                                  <th>Version</th>
                                  <th>Secure Release</th>
                                  <th>CVE Records</th>
                                  <th>Severity</th>
                                </tr>
                              </thead>
                              <tbody>
                                {results.vulnerable_dependencies.map((d, idx) => (
                                  <tr key={idx}>
                                    <td className="pkg-name">{d.package}</td>
                                    <td style={{ fontFamily: "var(--font-code)" }}>{d.current_version}</td>
                                    <td style={{ fontFamily: "var(--font-code)", color: "var(--color-low)", fontWeight: "bold" }}>{d.safe_version}</td>
                                    <td>
                                      {d.cve_ids.map(cve => (
                                        <span key={cve} className="cve-badge">{cve}</span>
                                      ))}
                                    </td>
                                    <td>
                                      <span className={`severity-badge ${d.severity.toLowerCase()}`} style={{ minWidth: "60px", fontSize: "10px" }}>
                                        {d.severity}
                                      </span>
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        ) : (
                          <div style={{ textAlign: "center", padding: "40px", color: "var(--text-secondary)", fontSize: "13px" }}>
                            ✓ No library dependencies with known vulnerabilities detected.
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {/* REMEDIATION TAB */}
                  {activeTab === "REMEDIATION" && (
                    <div>
                      {results ? (
                        <div>
                          {/* Priority Filter */}
                          <div className="vulnerabilities-filter">
                            {["ALL", "P1", "P2", "P3"].map(prio => (
                              <button 
                                key={prio} 
                                className={`filter-btn ${remedFilter === prio ? 'active' : ''}`}
                                onClick={() => setRemedFilter(prio)}
                              >
                                {prio === "ALL" ? "ALL FIXES" : `PRIORITY ${prio}`} (
                                  {prio === "ALL" ? results.remediation_plan.length : results.remediation_plan.filter(r => r.priority === prio).length}
                                )
                              </button>
                            ))}
                          </div>

                          {/* Fix Plans List */}
                          <div>
                            {results.remediation_plan
                              .filter(r => remedFilter === "ALL" || r.priority === remedFilter)
                              .map(r => (
                                <div className="remediation-plan-card" key={r.finding_id}>
                                  <div className="remediation-header">
                                    <div className="remediation-title-area">
                                      <span style={{ fontSize: "12px", fontFamily: "var(--font-code)", color: "var(--text-secondary)" }}>
                                        FINDING: {r.finding_id}
                                      </span>
                                      <h3 style={{ fontFamily: "var(--font-headings)", fontSize: "20px", fontWeight: "700", color: "var(--text-primary)" }}>
                                        {r.title}
                                      </h3>
                                    </div>
                                    <div className="remediation-meta">
                                      <span className="remediation-badge priority">{r.priority}</span>
                                      <span className="remediation-badge SLA">SLA: {r.sla}</span>
                                      <span className="remediation-badge effort">LOE: {r.effort_hours}h</span>
                                      <span className="remediation-badge assigned">OWNER: {r.assigned_to}</span>
                                    </div>
                                  </div>

                                  <div className="form-group">
                                    <div className="vuln-info-label">ROOT CAUSE</div>
                                    <div className="vuln-info-value">{r.root_cause}</div>
                                  </div>

                                  <div className="form-group">
                                    <div className="vuln-info-label">REMEDIATION ACTIONS</div>
                                    <ul className="remediation-steps-list">
                                      {r.fix_steps.map((step, idx) => (
                                        <li key={idx}>{step}</li>
                                      ))}
                                    </ul>
                                  </div>

                                  {/* Code Diff Component */}
                                  <div className="diff-container">
                                    <div>
                                      <div className="diff-block-title vuln">✗ VULNERABLE SYNTAX</div>
                                      <pre className="code-block" style={{ height: "180px", overflowY: "auto" }}>
                                        <span className="code-line-red">{r.vulnerable_code}</span>
                                      </pre>
                                    </div>
                                    <div>
                                      <div className="diff-block-title fixed">✓ COMPLIANT SECURED REFACTOR</div>
                                      <pre className="code-block" style={{ height: "180px", overflowY: "auto" }}>
                                        <span className="code-line-green">{r.fixed_code}</span>
                                      </pre>
                                    </div>
                                  </div>

                                  <div className="form-group" style={{ marginTop: "20px" }}>
                                    <div className="vuln-info-label">VERIFICATION AUDIT STEPS</div>
                                    <ul className="remediation-steps-list" style={{ listStyleType: "square" }}>
                                      {r.verification_steps.map((vs, idx) => (
                                        <li key={idx}>{vs}</li>
                                      ))}
                                    </ul>
                                  </div>
                                </div>
                              ))}
                          </div>
                        </div>
                      ) : (
                        <div style={{ textAlign: "center", padding: "40px", color: "var(--text-secondary)" }}>
                          No remediation actions compiled. Auditing must be run first on codebase assets.
                        </div>
                      )}
                    </div>
                  )}

                  {/* ATTACK CHAIN TAB */}
                  {activeTab === "ATTACK_CHAIN" && (
                    <div>
                      {results ? (
                        <div className="dashboard-panel">
                          <div className="panel-title">THREAT ROADMAP TIMELINE FLOW</div>
                          <p style={{ fontSize: "13px", color: "var(--text-secondary)", marginBottom: "30px", lineHeight: "1.5" }}>
                            The threat diagram tracks how an external vector threat can sequentially leverage separate vulnerabilities to compromise systems.
                          </p>

                          <div className="attack-chain-container">
                            {results.attack_chain.map((ac, idx) => (
                              <div key={ac.step}>
                                <div className="attack-chain-step">
                                  <div className="attack-chain-num">{ac.step}</div>
                                  <div className="attack-chain-content">
                                    <div className="attack-chain-title">
                                      <span>{ac.title}</span>
                                      <span className="attack-chain-ref">{ac.finding_id}</span>
                                    </div>
                                    <div className="attack-chain-desc">{ac.description}</div>
                                    <div className="attack-chain-technique">TACTIC: {ac.technique}</div>
                                  </div>
                                </div>
                                {idx < results.attack_chain.length - 1 && (
                                  <div className="attack-chain-arrow">↓</div>
                                )}
                              </div>
                            ))}
                          </div>
                        </div>
                      ) : (
                        <div style={{ textAlign: "center", padding: "40px", color: "var(--text-secondary)" }}>
                          No threat attack paths generated.
                        </div>
                      )}
                    </div>
                  )}

                  {/* COMPLIANCE TAB */}
                  {activeTab === "COMPLIANCE" && (
                    <div>
                      {results ? (
                        <div>
                          <div className="compliance-grid">
                            <div className="dashboard-panel" style={{ display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center" }}>
                              <div className="panel-title" style={{ width: "100%" }}>OWASP ASVS Standard</div>
                              <div className="gauge-wrapper" style={{ margin: "20px 0" }}>
                                <svg className="gauge-svg" viewBox="0 0 120 120">
                                  <circle className="gauge-track" cx="60" cy="60" r="50" />
                                  <circle 
                                    className="gauge-fill" 
                                    cx="60" 
                                    cy="60" 
                                    r="50"
                                    style={{
                                      stroke: 'var(--primary-accent)',
                                      strokeDasharray: `${(results.compliance.owasp_asvs_score / 100) * 314} 314`
                                    }}
                                  />
                                </svg>
                                <div className="gauge-value-text">
                                  <div className="gauge-number" style={{ fontSize: "28px" }}>{results.compliance.owasp_asvs_score}</div>
                                  <div className="gauge-label">RATING</div>
                                </div>
                              </div>
                              <span style={{ fontSize: "12px", color: "var(--text-secondary)" }}>
                                Compliance score based on ASVS controls requirements mapping.
                              </span>
                            </div>

                            <div className="dashboard-panel" style={{ display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center" }}>
                              <div className="panel-title" style={{ width: "100%" }}>ISO 27001 Controls</div>
                              <div className="gauge-wrapper" style={{ margin: "20px 0" }}>
                                <svg className="gauge-svg" viewBox="0 0 120 120">
                                  <circle className="gauge-track" cx="60" cy="60" r="50" />
                                  <circle 
                                    className="gauge-fill" 
                                    cx="60" 
                                    cy="60" 
                                    r="50"
                                    style={{
                                      stroke: 'var(--primary-accent)',
                                      strokeDasharray: `${(results.compliance.iso27001_score / 100) * 314} 314`
                                    }}
                                  />
                                </svg>
                                <div className="gauge-value-text">
                                  <div className="gauge-number" style={{ fontSize: "28px" }}>{results.compliance.iso27001_score}</div>
                                  <div className="gauge-label">RATING</div>
                                </div>
                              </div>
                              <span style={{ fontSize: "12px", color: "var(--text-secondary)" }}>
                                Compliance status evaluating input handling and key storage security.
                              </span>
                            </div>

                            <div className="dashboard-panel" style={{ display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center" }}>
                              <div className="panel-title" style={{ width: "100%" }}>SOC 2 Compliance</div>
                              <div className="gauge-wrapper" style={{ margin: "20px 0" }}>
                                <svg className="gauge-svg" viewBox="0 0 120 120">
                                  <circle className="gauge-track" cx="60" cy="60" r="50" />
                                  <circle 
                                    className="gauge-fill" 
                                    cx="60" 
                                    cy="60" 
                                    r="50"
                                    style={{
                                      stroke: 'var(--primary-accent)',
                                      strokeDasharray: `${(results.compliance.soc2_score / 100) * 314} 314`
                                    }}
                                  />
                                </svg>
                                <div className="gauge-value-text">
                                  <div className="gauge-number" style={{ fontSize: "28px" }}>{results.compliance.soc2_score}</div>
                                  <div className="gauge-label">RATING</div>
                                </div>
                              </div>
                              <span style={{ fontSize: "12px", color: "var(--text-secondary)" }}>
                                Compliance alignment assessing system integrity indicators.
                              </span>
                            </div>
                          </div>

                          {/* Compliance Gaps */}
                          <div className="dashboard-panel">
                            <div className="panel-title">COMPLIANCE CONTROL GAPS DETECTED</div>
                            <div>
                              {results.compliance.gaps.map((gap, idx) => (
                                <div className="compliance-gap-item" key={idx}>
                                  <span className="compliance-gap-icon">⚠</span>
                                  <span className="compliance-gap-text">{gap}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      ) : (
                        <div style={{ textAlign: "center", padding: "40px", color: "var(--text-secondary)" }}>
                          No compliance records compiled.
                        </div>
                      )}
                    </div>
                  )}

                  {/* EXPORT TAB */}
                  {activeTab === "EXPORT" && (
                    <div>
                      {results ? (
                        <div className="export-grid">
                          <div className="export-card">
                            <div>
                              <h3 className="export-card-title">Download Security Intelligence PDF Report</h3>
                              <p className="export-card-desc" style={{ marginTop: "10px" }}>
                                Generate and download a dedicated, print-ready PDF audit document from scratch. Contains cover pages, executive tables, detailed vulnerability sections, side-by-side remediation syntax blocks, threat timelines, and disclaimer sheets.
                              </p>
                            </div>
                            <button className="btn btn-primary" style={{ marginTop: "20px" }} onClick={exportPdf}>
                              EXPORT PDF REPORT
                            </button>
                          </div>

                          <div className="export-card">
                            <div>
                              <h3 className="export-card-title">Extract Vulnerabilities Data Payload</h3>
                              <p className="export-card-desc" style={{ marginTop: "10px" }}>
                                Download findings data in JSON schema formats or copy the executive summary overview onto the clipboard for incident response or logging tasks.
                              </p>
                            </div>
                            <div style={{ display: "flex", flexDirection: "column", gap: "10px", marginTop: "20px" }}>
                              <button className="btn btn-secondary" onClick={exportFindingsJson}>DOWNLOAD FINDINGS JSON</button>
                              <button className="btn btn-secondary" onClick={exportRemediationJson}>DOWNLOAD REMEDIATION JSON</button>
                              <button className="btn btn-secondary" onClick={copyExecutiveSummary}>COPY EXECUTIVE SUMMARY</button>
                            </div>
                          </div>
                        </div>
                      ) : (
                        <div style={{ textAlign: "center", padding: "40px", color: "var(--text-secondary)" }}>
                          No audit reports compiled for export.
                        </div>
                      )}
                    </div>
                  )}

                </div>
              </div>
            </div>
          </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<PhantomStrikeApp />);
  </script>
</body>
</html>
